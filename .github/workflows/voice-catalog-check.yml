name: Voice catalog freshness check

# Detect when k2-fsa/sherpa-onnx publishes Piper or Kokoro models we haven't
# mirrored into VoxSherpa-TTS:voices-v2 yet. Runs on a monthly cron and on
# manual dispatch. Doesn't auto-publish (that needs write access to
# VoxSherpa-TTS); just files an issue summarising the diff so a human can
# run `scripts/voices/refresh-voices-v2.sh`.

on:
  schedule:
    # 12:00 UTC on the 1st of each month
    - cron: "0 12 1 * *"
  workflow_dispatch:

permissions:
  issues: write
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Diff upstream tarballs vs voices-v2
        id: diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          UPSTREAM=$(gh release view tts-models --repo k2-fsa/sherpa-onnx \
            --json assets --jq '.assets[].name' \
            | grep -E '^(vits-piper-(en_US|en_GB)-[a-z_]+-?[a-z]*\.tar\.bz2|kokoro-multi-lang-v1_1\.tar\.bz2)$' \
            | grep -v -- '-int8\.tar\.bz2' \
            | grep -v -- '-fp16\.tar\.bz2' \
            | sed -E '
                s|^vits-piper-(.*)\.tar\.bz2$|\1.onnx|
                s|^kokoro-multi-lang-v1_1\.tar\.bz2$|kokoro-model.onnx|' \
            | sort -u)
          OURS=$(gh release view voices-v2 --repo jphein/VoxSherpa-TTS \
            --json assets --jq '.assets[].name' 2>/dev/null \
            | grep '\.onnx$' | sort -u || true)
          MISSING=$(comm -23 <(echo "$UPSTREAM") <(echo "$OURS"))
          {
            echo "missing<<MISSING_EOF"
            echo "$MISSING"
            echo "MISSING_EOF"
          } >> "$GITHUB_OUTPUT"
          if [[ -n "$MISSING" ]]; then
            echo "Missing voices in voices-v2:"
            echo "$MISSING"
          else
            echo "voices-v2 is in sync with upstream."
          fi

      - name: File issue if drift detected
        if: steps.diff.outputs.missing != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MISSING: ${{ steps.diff.outputs.missing }}
          REPO: ${{ github.repository }}
          TODAY: ${{ github.event.repository.updated_at }}
        run: |
          set -euo pipefail
          # Body is built with shell heredoc + env vars (never inlining
          # ${{ ... }} into the script body) so action-injection patterns
          # don't apply.
          BODY=$(cat <<EOF
          The monthly voice-catalog freshness check detected new Piper or Kokoro models in [k2-fsa/sherpa-onnx tts-models](https://github.com/k2-fsa/sherpa-onnx/releases/tag/tts-models) that aren't mirrored in [VoxSherpa-TTS:voices-v2](https://github.com/jphein/VoxSherpa-TTS/releases/tag/voices-v2):

          \`\`\`
          ${MISSING}
          \`\`\`

          To refresh, run \`scripts/voices/refresh-voices-v2.sh\` locally (needs gh write access to jphein/VoxSherpa-TTS) and add new entries to \`core-playback/.../VoiceCatalog.kt\`.

          Triggered by: \`.github/workflows/voice-catalog-check.yml\`.
          EOF
          )
          gh issue create \
            --repo "$REPO" \
            --title "voices-v2 catalog out of date" \
            --body "$BODY"
