name: Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-debug:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true

      - name: Cache Gradle (deps only)
        # Cache only resolved dependency files, not the whole ~/.gradle
        # tree. The full tree includes transformed AARs / R8 mapping /
        # build outputs and balloons to ~3 GB per build — fast to
        # rebuild but expensive to store on the 2 GB free-tier quota.
        # Dependency files alone are ~300-500 MB and what actually
        # earns its keep across runs. Key is stable across day-to-day
        # commits (only changes when Gradle wrapper or version catalog
        # moves), so we get a single shared cache instead of one per
        # gradle-file edit.
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/modules-2
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/gradle-wrapper.properties', 'gradle/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        # Only upload on tag builds — the artifact is consumed by the
        # release-attach job downstream, which itself only runs on
        # tag refs. PR / main pushes don't need the upload; gating
        # here keeps GitHub Actions artifact storage spend bounded
        # to roughly (releases × APK size) instead of every CI run.
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: storyvox-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach APK to release
    needs: build-debug
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download debug APK
        uses: actions/download-artifact@v4
        with:
          name: storyvox-debug.apk
          path: artifacts

      - name: Rename APK with tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mv artifacts/app-debug.apk "artifacts/storyvox-${TAG}.apk"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            Debug APK build for `${{ github.ref_name }}`.

            > Unsigned debug build. Sideload at your own risk; signed release builds will arrive in a future version.
          files: artifacts/storyvox-${{ github.ref_name }}.apk
